services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: vs_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-changeme}
      MONGO_INITDB_DATABASE:      ${MONGO_DB:-vulnsamurai}
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Rust API ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vs_api
    restart: unless-stopped
    environment:
      MONGO_URI:        mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-changeme}@mongo:27017/${MONGO_DB:-vulnsamurai}?authSource=admin
      MONGO_DB:         ${MONGO_DB:-vulnsamurai}
      JWT_SECRET:       ${JWT_SECRET:-super_secret_change_in_prod}
      BIND_ADDR:        0.0.0.0:8000
      FRONTEND_ORIGIN:  http://localhost:80
      RUST_LOG:         vuln_samurai_api=debug,tower_http=info
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend_net
      - frontend_net

  # ── Frontend (plug in your existing service here) ────────────────────────────
  # frontend:
  #   build: ./frontend
  #   container_name: vs_frontend
  #   restart: unless-stopped
  #   networks:
  #     - frontend_net

  # ── nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vs_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - frontend_net

volumes:
  mongo_data:

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
